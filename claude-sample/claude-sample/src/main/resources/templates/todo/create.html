<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo 등록</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #007bff;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-primary {
            background-color: #007bff;
            color: white;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background-color: #545b62;
        }
    </style>
</head>
<body>
    <h1>✏️ 새 Todo 등록</h1>
    
    <form action="/todos/create" method="post">
        <div class="form-group">
            <label for="title">제목 *</label>
            <input type="text" 
                   id="title" 
                   name="title" 
                   required 
                   placeholder="할 일을 입력하세요"
                   autofocus>
        </div>
        
        <div class="form-group">
            <label for="description">설명</label>
            <textarea id="description" 
                      name="description" 
                      placeholder="상세 설명을 입력하세요 (선택사항)"></textarea>
        </div>
        
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">등록</button>
            <a href="/todos" class="btn btn-secondary">취소</a>
        </div>
    </form>
</body>
</html>
